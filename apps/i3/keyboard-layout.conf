# Per-window keyboard layout memory (X11 + i3)
#
# X11 has one global layout; the daemon saves the layout when focus leaves a
# window and restores the saved layout when you return.
#
# Add to your i3 config (Regolith: ~/.config/regolith3/i3/config.d/ or include from ~/.config/i3/config):
#   include /home/user/git/dotfiles/apps/i3/keyboard-layout.conf
#
# Adjust paths if your dotfiles live elsewhere.

exec_always --no-startup-id /home/user/git/dotfiles/apps/i3/per-window-layout-daemon.sh
bindsym $mod+Mod1+BackSpace exec --no-startup-id /home/user/git/dotfiles/apps/i3/layout-cycle.sh
